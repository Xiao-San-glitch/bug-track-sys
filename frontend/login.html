<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker Pro - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-center">
                <div class="logo-text">
                    <h1>BugTracker Pro</h1>
                </div>
            </div>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary w-100 mt-4">Sign In</button>
            </form>
            <p style="text-align:center; margin-top: 15px;">
                <a href="index.html" class="btn-secondary">Back to Homepage</a>
            </p>
        </div>
    </div>
</body>
</html>
